<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎯 Habit Tracker</title>
    <style>
      :root {
        /* Light mode colors */
        --bg-primary: #ffffff;
        --bg-secondary: #f8f9fa;
        --bg-gradient-start: #667eea;
        --bg-gradient-end: #764ba2;
        --text-primary: #333333;
        --text-secondary: #666666;
        --text-light: #999999;
        --border-color: #e0e0e0;
        --border-light: #f0f0f0;
        --accent-color: #667eea;
        --accent-light: rgba(102, 126, 234, 0.1);
        --accent-lighter: rgba(102, 126, 234, 0.3);
        --shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        --shadow-sm: 0 5px 20px rgba(0, 0, 0, 0.1);
        --success-color: #4CAF50;
        --danger-color: #FF6B6B;
        --warning-color: #8DD3C7;
        --card-bg: var(--bg-primary);
        --border: var(--border-color);
      }

      html.dark-mode {
        /* Dark mode colors */
        --bg-primary: #1e1e2e;
        --bg-secondary: #2a2a3e;
        --bg-gradient-start: #667eea;
        --bg-gradient-end: #764ba2;
        --text-primary: #e4e4e7;
        --text-secondary: #a1a1a9;
        --text-light: #71717a;
        --border-color: #3f3f4f;
        --border-light: #2a2a3e;
        --accent-color: #667eea;
        --accent-light: rgba(102, 126, 234, 0.2);
        --accent-lighter: rgba(102, 126, 234, 0.4);
        --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        --shadow-sm: 0 5px 20px rgba(0, 0, 0, 0.3);
        --success-color: #4CAF50;
        --danger-color: #FF6B6B;
        --warning-color: #8DD3C7;
        --card-bg: var(--bg-primary);
        --border: var(--border-color);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
        min-height: 100vh;
        padding: 20px;
        color: var(--text-primary);
      }

      #root {
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
